<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - Markdown Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-deep: #0d1117;
      --bg-surface: rgba(22, 27, 34, 0.85);
      --bg-input: rgba(255, 255, 255, 0.06);
      --border: rgba(255, 255, 255, 0.08);
      --border-focus: rgba(99, 102, 241, 0.6);
      --accent: #6366f1;
      --accent-hover: #818cf8;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --error: #f87171;
      --success: #34d399;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-deep);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      color: var(--text);
    }

    /* Animated gradient background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 10%, rgba(99, 102, 241, 0.15) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 80%, rgba(139, 92, 246, 0.12) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 50% 50%, rgba(16, 185, 129, 0.05) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .login-card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 400px;
      margin: 1rem;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2.5rem;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.04) inset,
        0 24px 64px rgba(0,0,0,0.4),
        0 0 80px rgba(99, 102, 241, 0.06);
      animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 2rem;
    }

    .logo-icon {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 16px rgba(99, 102, 241, 0.3);
      flex-shrink: 0;
    }

    .logo-icon svg {
      color: #fff;
    }

    .logo-text h1 {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1.2;
    }

    .logo-text p {
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .form-group {
      margin-bottom: 1.25rem;
    }

    label {
      display: block;
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
      letter-spacing: 0.3px;
    }

    .input-wrapper {
      position: relative;
    }

    .input-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      pointer-events: none;
      transition: color 0.2s;
    }

    input[type="password"] {
      width: 100%;
      padding: 0.75rem 1rem 0.75rem 2.75rem;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 0.95rem;
      font-family: inherit;
      outline: none;
      transition: all 0.2s;
    }

    input[type="password"]:focus {
      border-color: var(--border-focus);
      background: rgba(99, 102, 241, 0.06);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.12);
    }

    input[type="password"]:focus + .input-icon,
    .input-wrapper:focus-within .input-icon {
      color: var(--accent-hover);
    }

    .login-btn {
      width: 100%;
      padding: 0.85rem;
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
      margin-top: 0.5rem;
      box-shadow: 0 4px 16px rgba(99, 102, 241, 0.3);
    }

    .login-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0);
      transition: background 0.2s;
    }

    .login-btn:hover::before { background: rgba(255,255,255,0.08); }
    .login-btn:active { transform: scale(0.99); }

    .login-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .btn-content {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .spinner {
      animation: spin 1s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg {
      margin-top: 1rem;
      padding: 0.65rem 0.9rem;
      background: rgba(248, 113, 113, 0.1);
      border: 1px solid rgba(248, 113, 113, 0.25);
      border-radius: 8px;
      color: var(--error);
      font-size: 0.83rem;
      display: none;
      animation: fadeIn 0.2s ease;
    }

    .error-msg.show { display: block; }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 1.5rem 0;
    }

    .footer-note {
      text-align: center;
      font-size: 0.75rem;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo-area">
      <div class="logo-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/>
          <polyline points="14 2 14 8 20 8"/>
          <path d="M16 13H8"/><path d="M16 17H8"/><path d="M10 9H8"/>
        </svg>
      </div>
      <div class="logo-text">
        <h1>Markdown Hub</h1>
        <p>管理员登录</p>
      </div>
    </div>

    <form id="login-form">
      <div class="form-group">
        <label for="password">管理员密码</label>
        <div class="input-wrapper">
          <input
            type="password"
            id="password"
            placeholder="请输入管理员密码"
            autocomplete="current-password"
            required
          />
          <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
        </div>
      </div>

      <button type="submit" class="login-btn" id="login-btn">
        <span class="btn-content" id="btn-content">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
            <polyline points="10 17 15 12 10 7"/>
            <line x1="15" y1="12" x2="3" y2="12"/>
          </svg>
          登录
        </span>
      </button>

      <div class="error-msg" id="error-msg"></div>
    </form>

    <div class="divider"></div>
    <p class="footer-note">会话有效期 2 小时，过期后需重新登录</p>
  </div>

  <script>
    // If already authenticated, redirect to main page
    fetch('/api/check-auth').then(res => {
      if (res.ok) window.location.href = '/';
    }).catch(() => {});

    const form = document.getElementById('login-form');
    const loginBtn = document.getElementById('login-btn');
    const btnContent = document.getElementById('btn-content');
    const errorMsg = document.getElementById('error-msg');
    const passwordInput = document.getElementById('password');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = passwordInput.value;

      // Show loading state
      loginBtn.disabled = true;
      btnContent.innerHTML = `
        <svg class="spinner" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/>
          <line x1="4.93" y1="4.93" x2="7.76" y2="7.76"/><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"/>
          <line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/>
          <line x1="4.93" y1="19.07" x2="7.76" y2="16.24"/><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"/>
        </svg>
        验证中...
      `;
      errorMsg.classList.remove('show');

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password })
        });

        const data = await res.json();

        if (res.ok && data.success) {
          window.location.href = '/';
        } else {
          showError(data.error || '登录失败，请重试');
        }
      } catch (err) {
        showError('网络错误，请检查连接');
      } finally {
        loginBtn.disabled = false;
        btnContent.innerHTML = `
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
            <polyline points="10 17 15 12 10 7"/>
            <line x1="15" y1="12" x2="3" y2="12"/>
          </svg>
          登录
        `;
      }
    });

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.classList.add('show');
      passwordInput.focus();
      passwordInput.select();
    }
  </script>
</body>
</html>
